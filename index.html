<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maa Kali Pooja Site</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Maa Kali Pooja</h1>
        <nav>
            <ul>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#videos">Videos</a></li>
                <li><a href="#donate">Donations</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="pooja">
            <h2>Welcome to Maa Kali Pooja</h2>
            <p>Embrace the divine presence of Maa Kali in your life.</p>
        </section>
        <section id="gallery">
            <h2>Gallery</h2>
            <img src="gallery/image1.jpg" alt="Gallery Image 1">
            <img src="gallery/image2.jpg" alt="Gallery Image 2">
        </section>
        <section id="videos">
            <h2>Videos</h2>
            <video controls>
                <source src="videos/pooja_video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </section>
        <section id="donate">
            <h2>Donations</h2>
            <p>Your contributions help keep the pooja alive.</p>
            <button>Donate Now</button>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Maa Kali Pooja. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
